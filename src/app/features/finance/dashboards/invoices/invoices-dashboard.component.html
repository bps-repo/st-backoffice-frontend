<div class="grid">

    @let loading = (loading$ | async) ?? false;

    <!-- Filter Bar -->
    <div class="col-12">
        <div class="card">
            <div class="flex flex-wrap gap-3 align-items-center">
                <span class="font-semibold text-color-secondary">Centro:</span>
                <p-dropdown
                    [options]="(centerOptions$ | async) ?? []"
                    [(ngModel)]="selectedCenterId"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Todos os centros"
                    styleClass="min-w-15rem w-full md:w-auto"
                    appendTo="body"
                ></p-dropdown>

                <span class="font-semibold text-color-secondary">Período:</span>
                <p-calendar
                    [(ngModel)]="dateRange"
                    selectionMode="range"
                    [readonlyInput]="true"
                    dateFormat="dd/mm/yy"
                    placeholder="Data início – Data fim"
                    [showIcon]="true"
                    styleClass="w-18rem"
                ></p-calendar>
                <p-button
                    label="Aplicar"
                    icon="pi pi-filter"
                    (onClick)="applyFilter()"
                    [loading]="loading"
                ></p-button>
                <p-button
                    label="Limpar"
                    icon="pi pi-times"
                    severity="secondary"
                    [outlined]="true"
                    (onClick)="clearFilter()"
                    [disabled]="loading || (!dateRange?.length && !selectedCenterId)"
                ></p-button>
            </div>
        </div>
    </div>

    <!-- Error State -->
    <div class="col-12" *ngIf="error">
        <div class="card">
            <div class="flex align-items-center gap-2 text-red-600">
                <i class="pi pi-exclamation-triangle text-xl"></i>
                <span class="font-semibold">{{ error }}</span>
                <p-button
                    label="Tentar novamente"
                    icon="pi pi-refresh"
                    severity="danger"
                    [text]="true"
                    size="small"
                    (onClick)="retryLoad()"
                    class="ml-2"
                ></p-button>
            </div>
        </div>
    </div>

    <!-- Trends Chart -->
    <div class="col-12">
        <div class="card">
            <div class="text-xl font-semibold mb-4">Evolução de Faturação</div>

            <p-skeleton *ngIf="loading" height="380px"></p-skeleton>

            <p-chart
                *ngIf="!loading && barChartData"
                type="bar"
                [data]="barChartData"
                [options]="barChartOptions"
                height="380px"
            ></p-chart>

            <div *ngIf="!loading && !barChartData && !error"
                 class="flex flex-column align-items-center justify-content-center py-6 text-color-secondary">
                <i class="pi pi-chart-bar text-4xl mb-3"></i>
                <span>Sem dados para o período seleccionado.</span>
            </div>
        </div>
    </div>

</div>
