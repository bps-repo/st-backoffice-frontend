<!-- src/app/features/schoolar/features/settings/components/assessments/assessments-setting.component.html -->
<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="grid">
    <!-- Skills Section -->
    <div class="col-12">
        <p-card>
            <ng-template pTemplate="header">
                <div class="flex justify-content-between align-items-center px-4 pt-4">
                    <div>
                        <h3 class="font-bold text-lg mb-1">Habilidades (Skills)</h3>
                        <span class="text-color-secondary text-sm">
                            Gerencie as habilidades disponíveis para avaliações
                        </span>
                    </div>
                    <p-button
                        label="Nova Habilidade"
                        icon="pi pi-plus"
                        (onClick)="openCreate()"
                    ></p-button>
                </div>
            </ng-template>

            <p-table
                [value]="skills()"
                [loading]="loading()"
                [paginator]="true"
                [rows]="pageSize()"
                [totalRecords]="totalRecords()"
                [lazy]="true"
                (onLazyLoad)="onPage($any($event))"
                [rowsPerPageOptions]="[10, 20, 50]"
                styleClass="p-datatable-sm"
                responsiveLayout="scroll"
            >
                <ng-template pTemplate="header">
                    <tr>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th class="text-center w-8rem">Ações</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-skill>
                    <tr>
                        <td class="font-medium">{{ skill.name }}</td>
                        <td class="text-color-secondary">{{ skill.description || '—' }}</td>
                        <td>
                            <div class="flex gap-1 justify-content-center">
                                <button
                                    pButton pRipple
                                    icon="pi pi-pencil"
                                    class="p-button-rounded p-button-text p-button-warning"
                                    pTooltip="Editar"
                                    tooltipPosition="top"
                                    (click)="openEdit(skill)"
                                ></button>
                                <button
                                    pButton pRipple
                                    icon="pi pi-trash"
                                    class="p-button-rounded p-button-text p-button-danger"
                                    pTooltip="Excluir"
                                    tooltipPosition="top"
                                    (click)="confirmDelete(skill)"
                                ></button>
                            </div>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="empty">
                    <tr>
                        <td colspan="3" class="text-center py-5 text-color-secondary">
                            <i class="pi pi-inbox text-4xl mb-3 block"></i>
                            Nenhuma habilidade cadastrada.
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </p-card>
    </div>
</div>

<!-- Create / Edit Dialog -->
<p-dialog
    [header]="editMode ? 'Editar Habilidade' : 'Nova Habilidade'"
    [(visible)]="dialogVisible"
    [modal]="true"
    [style]="{ width: '480px' }"
    [draggable]="false"
    [resizable]="false"
>
    <div class="grid p-fluid mt-2">
        <div class="col-12 field">
            <label class="font-semibold">Nome <span class="text-red-500">*</span></label>
            <input
                pInputText
                [(ngModel)]="skillName"
                placeholder="Ex: Reading Comprehension"
                (keydown.enter)="save()"
            />
        </div>

        <div class="col-12 field">
            <label class="font-semibold">Descrição</label>
            <textarea
                pTextarea
                [(ngModel)]="skillDescription"
                rows="3"
                placeholder="Descreva brevemente esta habilidade..."
                autoResize="true"
            ></textarea>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <p-button
                label="Cancelar"
                severity="secondary"
                [outlined]="true"
                (onClick)="closeDialog()"
            ></p-button>
            <p-button
                [label]="editMode ? 'Salvar alterações' : 'Criar Habilidade'"
                icon="pi pi-check"
                [loading]="saving()"
                [disabled]="!isFormValid()"
                (onClick)="save()"
            ></p-button>
        </div>
    </ng-template>
</p-dialog>
