<!-- src/app/features/schoolar/features/assessments/pages/edit/edit.component.html -->
<p-toast></p-toast>

@if (loading()) {
    <div class="flex justify-content-center align-items-center" style="min-height: 300px">
        <p-progressSpinner strokeWidth="4"></p-progressSpinner>
    </div>
} @else {
    <p-card>
        <ng-template pTemplate="title">
            <div class="flex align-items-center gap-2">
                <p-button icon="pi pi-arrow-left" severity="secondary" [text]="true" (onClick)="cancel()"></p-button>
                <span>Editar Avaliação</span>
            </div>
        </ng-template>

        <ng-template pTemplate="content">
            <div class="grid p-fluid">

                <!-- Title -->
                <div class="col-12 md:col-6 field">
                    <label class="font-semibold">Título <span class="text-red-500">*</span></label>
                    <input pInputText [(ngModel)]="title" placeholder="Ex: Final Exam – Unit 1" />
                </div>

                <!-- Assessment Type -->
                <div class="col-12 md:col-6 field">
                    <label class="font-semibold">Tipo de Avaliação <span class="text-red-500">*</span></label>
                    <p-dropdown
                        [options]="assessmentTypeOptions"
                        [(ngModel)]="assessmentType"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Selecione o tipo"
                        [showClear]="true"
                        appendTo="body"
                    ></p-dropdown>
                </div>

                <!-- Description -->
                <div class="col-12 field">
                    <label class="font-semibold">Descrição</label>
                    <textarea
                        pTextarea
                        [(ngModel)]="description"
                        rows="3"
                        placeholder="Descreva o objetivo da avaliação..."
                        autoResize="true"
                    ></textarea>
                </div>

                <!-- Evaluation Type -->
                <div class="col-12 md:col-6 field">
                    <label class="font-semibold">Tipo de Conteúdo <span class="text-red-500">*</span></label>
                    <p-dropdown
                        [options]="evaluationTypeOptions"
                        [ngModel]="evaluationType()"
                        (ngModelChange)="onEvaluationTypeChange($event)"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Selecione"
                        [showClear]="true"
                        appendTo="body"
                    ></p-dropdown>
                </div>

                <!-- Status -->
                <div class="col-12 md:col-6 field">
                    <label class="font-semibold">Status <span class="text-red-500">*</span></label>
                    <p-dropdown
                        [options]="statusOptions"
                        [(ngModel)]="status"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Status"
                        appendTo="body"
                    ></p-dropdown>
                </div>

                <!-- Passing Score -->
                <div class="col-12 md:col-6 field">
                    <label class="font-semibold">Nota mínima de aprovação</label>
                    <p-inputNumber [(ngModel)]="passingScore" [min]="0" [max]="100" suffix=" pts"></p-inputNumber>
                </div>

                <!-- Shared Date -->
                <div class="col-12 md:col-4 field">
                    <label class="font-semibold">Data <span class="text-red-500">*</span></label>
                    <p-datepicker
                        [(ngModel)]="sharedDate"
                        [showIcon]="true"
                        dateFormat="dd/mm/yy"
                        placeholder="dd/mm/aaaa"
                        appendTo="body"
                    ></p-datepicker>
                </div>

                <!-- Start Time -->
                <div class="col-12 md:col-4 field">
                    <label class="font-semibold">Hora de início <span class="text-red-500">*</span></label>
                    <p-datepicker
                        [(ngModel)]="startTime"
                        [timeOnly]="true"
                        hourFormat="24"
                        placeholder="hh:mm"
                        appendTo="body"
                    ></p-datepicker>
                </div>

                <!-- End Time -->
                <div class="col-12 md:col-4 field">
                    <label class="font-semibold">Hora de término <span class="text-red-500">*</span></label>
                    <p-datepicker
                        [(ngModel)]="endTime"
                        [timeOnly]="true"
                        hourFormat="24"
                        placeholder="hh:mm"
                        appendTo="body"
                    ></p-datepicker>
                </div>

                <!-- Skills multi-selector -->
                @if (isSkillsMode()) {
                    <div class="col-12 field">
                        <label class="font-semibold">Habilidades avaliadas <span class="text-red-500">*</span></label>
                        <p-multiSelect
                            [options]="skillOptions()"
                            [(ngModel)]="selectedSkillIds"
                            optionLabel="label"
                            optionValue="value"
                            placeholder="Selecione as habilidades"
                            display="chip"
                            [filter]="true"
                            filterPlaceholder="Buscar habilidade..."
                            [resetFilterOnHide]="true"
                            appendTo="body"
                            (onFilter)="onSkillFilter($event)"
                        >
                            <ng-template pTemplate="footer">
                                @if (showCreateSkillButton()) {
                                    <div class="px-3 py-2 flex align-items-center gap-2 border-top-1 surface-border">
                                        <span class="text-sm text-color-secondary flex-shrink-0">Criar habilidade:</span>
                                        <p-button
                                            [label]="skillFilterValue()"
                                            icon="pi pi-plus"
                                            size="small"
                                            (onClick)="onSkillFilter({ filter: skillFilterValue() })"
                                            styleClass="p-button-text"
                                        ></p-button>
                                    </div>
                                }
                            </ng-template>
                        </p-multiSelect>
                    </div>
                }

                <!-- Units mode: level first, then filtered units -->
                @if (isUnitsMode()) {
                    <div class="col-12 md:col-6 field">
                        <label class="font-semibold">Nível <span class="text-red-500">*</span></label>
                        <p-dropdown
                            [options]="levelOptions()"
                            [ngModel]="selectedLevelId()"
                            (ngModelChange)="onLevelChange($event)"
                            optionLabel="label"
                            optionValue="value"
                            placeholder="Selecione o nível"
                            [showClear]="true"
                            [filter]="true"
                            filterPlaceholder="Buscar nível..."
                            appendTo="body"
                        ></p-dropdown>
                    </div>

                    @if (hasLevelSelected()) {
                        <div class="col-12 field">
                            <label class="font-semibold">Unidades avaliadas <span class="text-red-500">*</span></label>
                            <p-multiSelect
                                [options]="filteredUnitOptions()"
                                [(ngModel)]="selectedEvaluatedUnitIds"
                                optionLabel="label"
                                optionValue="value"
                                placeholder="Selecione as unidades avaliadas"
                                display="chip"
                                [filter]="true"
                                filterPlaceholder="Buscar unidade..."
                                appendTo="body"
                            ></p-multiSelect>
                        </div>
                    }
                }

            </div>
        </ng-template>

        <ng-template pTemplate="footer">
            <div class="flex justify-content-end gap-2">
                <p-button
                    label="Cancelar"
                    icon="pi pi-times"
                    severity="secondary"
                    [outlined]="true"
                    (onClick)="cancel()"
                ></p-button>
                <p-button
                    label="Salvar Alterações"
                    icon="pi pi-check"
                    [loading]="saving()"
                    [disabled]="!isFormValid()"
                    (onClick)="save()"
                ></p-button>
            </div>
        </ng-template>
    </p-card>
}
