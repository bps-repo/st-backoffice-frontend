<p-dialog
    [(visible)]="visible"
    [style]="{ width: '560px' }"
    header="Novo produto / serviço"
    [modal]="true"
    styleClass="p-fluid"
    [draggable]="false"
    [resizable]="false"
    [closable]="true"
    (onHide)="resetForm()">

    <div class="flex flex-column gap-4 pt-2">

        <div class="flex flex-column gap-1">
            <label class="font-semibold text-sm" for="name">Nome <span class="text-red-500">*</span></label>
            <input
                id="name"
                type="text"
                pInputText
                class="w-full"
                [(ngModel)]="form.name"
                placeholder="Nome do produto / serviço">
        </div>

        <div class="flex flex-column gap-1">
            <label class="font-semibold text-sm" for="description">Descrição</label>
            <input
                id="description"
                type="text"
                pInputText
                class="w-full"
                [(ngModel)]="form.description"
                placeholder="Descrição opcional">
        </div>

        <div class="grid">
            <div class="col-12 md:col-6 flex flex-column gap-1">
                <label class="font-semibold text-sm" for="code">Código</label>
                <input
                    id="code"
                    type="text"
                    pInputText
                    class="w-full"
                    [(ngModel)]="form.code"
                    placeholder="Ex: CRS-ADULT-EN">
            </div>

            <div class="col-12 md:col-6 flex flex-column gap-1">
                <label class="font-semibold text-sm" for="providerName">Fornecedor</label>
                <input
                    id="providerName"
                    type="text"
                    pInputText
                    class="w-full"
                    [(ngModel)]="form.providerName"
                    placeholder="Nome do fornecedor">
            </div>

            <div class="col-12 md:col-6 flex flex-column gap-1">
                <label class="font-semibold text-sm" for="category">Categoria <span class="text-red-500">*</span></label>
                <p-select
                    inputId="category"
                    [options]="categoryOptions"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Selecionar categoria"
                    styleClass="w-full"
                    [(ngModel)]="form.category">
                </p-select>
            </div>

            <div class="col-12 md:col-6 flex flex-column gap-1">
                <label class="font-semibold text-sm" for="type">Tipo <span class="text-red-500">*</span></label>
                <p-select
                    inputId="type"
                    [options]="typeOptions"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Selecionar tipo"
                    styleClass="w-full"
                    [(ngModel)]="form.type">
                </p-select>
            </div>
        </div>

        <div class="flex flex-column gap-1">
            <label class="font-semibold text-sm" for="value">Valor (Kz)</label>
            <p-inputNumber
                inputId="value"
                [(ngModel)]="form.value"
                [min]="0"
                [minFractionDigits]="2"
                [maxFractionDigits]="2"
                mode="decimal"
                styleClass="w-full"
                inputStyleClass="w-full">
            </p-inputNumber>
        </div>

        <div class="flex align-items-center gap-2">
            <p-checkbox
                inputId="hasStock"
                [(ngModel)]="form.hasStock"
                [binary]="true"
                (ngModelChange)="onHasStockChange()">
            </p-checkbox>
            <label class="font-semibold text-sm mb-0" for="hasStock">Controla stock</label>
        </div>

        @if (form.hasStock) {
            <div class="grid">
                <div class="col-12 md:col-6 flex flex-column gap-1">
                    <label class="font-semibold text-sm" for="minimumStock">Stock mínimo</label>
                    <p-inputNumber
                        inputId="minimumStock"
                        [(ngModel)]="form.minimumStock"
                        [min]="0"
                        [useGrouping]="false"
                        styleClass="w-full"
                        inputStyleClass="w-full">
                    </p-inputNumber>
                </div>

                <div class="col-12 md:col-6 flex flex-column gap-1">
                    <label class="font-semibold text-sm" for="currentStock">Stock actual</label>
                    <p-inputNumber
                        inputId="currentStock"
                        [(ngModel)]="form.currentStock"
                        [min]="0"
                        [useGrouping]="false"
                        styleClass="w-full"
                        inputStyleClass="w-full">
                    </p-inputNumber>
                </div>
            </div>
        }

        <div class="flex align-items-center gap-3">
            <label class="font-semibold text-sm">Estado</label>
            <p-toggleButton
                [(ngModel)]="form.active"
                onLabel="Activo"
                offLabel="Inactivo"
                onIcon="pi pi-check"
                offIcon="pi pi-times">
            </p-toggleButton>
        </div>

    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <button
                pButton
                label="Cancelar"
                icon="pi pi-times"
                class="p-button-text p-button-secondary"
                (click)="hide()">
            </button>
            <button
                pButton
                label="Criar"
                icon="pi pi-plus"
                [loading]="(loading$ | async) || false"
                (click)="saveService()">
            </button>
        </div>
    </ng-template>
</p-dialog>
