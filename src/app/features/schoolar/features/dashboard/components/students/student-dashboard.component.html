<div class="grid">
    <!-- KPIs -->
    <ng-container *ngIf="loadingDashboardStatistics$ | async; else kpisContent">
        <div class="col-12 md:col-6 xl:col-3" *ngFor="let i of [1,2,3,4]">
            <div class="card h-full">
                <p-skeleton height="2rem" class="mb-2"></p-skeleton>
                <p-skeleton height="3rem" width="4rem"></p-skeleton>
                <p-skeleton height="1rem" width="3rem" class="mt-2"></p-skeleton>
            </div>
        </div>
    </ng-container>
    <ng-template #kpisContent>
        <div class="col-12 md:col-6 xl:col-4" *ngFor="let kpi of kpis$ | async">
            <div class="card h-full">
                <span class="font-semibold text-lg">{{ kpi.label }}</span>
                <div class="flex justify-content-between align-items-start mt-3">
                    <div class="w-6">
                        <span class="text-4xl font-bold text-900">{{ kpi.current }}</span>
                        <!-- <div [ngClass]="kpi.diff > 0 ? 'text-green-500' : 'text-red-500'">
                            <i class="pi" [ngClass]="kpi.diff > 0 ? 'pi-arrow-up' : 'pi-arrow-down'"></i>
                            {{ kpi.diff }}%
                        </div> -->
                    </div>
                </div>
            </div>
        </div>
    </ng-template>

    <!-- Monthly Enrollments Mixed Chart (Bar + Line with % change) -->
    <div class="col-12">
        <div class="card h-full">
            <div *ngIf="!(loading$ | async); else chartSkeletonMonthly">
                <p-chart
                    type="bar"
                    [data]="monthlyEnrollmentsData"
                    [options]="monthlyEnrollmentsOptions"
                    [plugins]="[monthlyChangePlugin]"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeletonMonthly>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Advanced Student Research Chart -->
    <div class="col-12">
        <div class="card h-full">
            <div class="flex justify-content-between align-items-center mb-3">
                <h5 class="text-xl font-semibold m-0">Pesquisa Avancada de Alunos</h5>
                <div class="flex align-items-center gap-2">
                    <span class="text-600">Resultados: <strong>{{ filteredStudentsCount }}</strong></span>
                    <button
                        pButton
                        type="button"
                        label="Limpar filtros"
                        class="p-button-sm p-button-outlined"
                        (click)="clearAdvancedFilters()"
                    ></button>
                </div>
            </div>

            <div class="grid mb-2">
                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Range de Idade</label>
                    <div class="flex align-items-center gap-2">
                        <input
                            type="number"
                            min="0"
                            class="w-full p-inputtext p-component"
                            placeholder="Min (ex: 15)"
                            [(ngModel)]="minAgeAdvanced"
                            (ngModelChange)="onAdvancedFiltersChange()"
                        />
                        <span class="text-500">-</span>
                        <input
                            type="number"
                            min="0"
                            class="w-full p-inputtext p-component"
                            placeholder="Max (ex: 50)"
                            [(ngModel)]="maxAgeAdvanced"
                            (ngModelChange)="onAdvancedFiltersChange()"
                        />
                    </div>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Provincia</label>
                    <p-dropdown
                        [options]="provinceAdvancedOptions"
                        [(ngModel)]="selectedProvinceAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todas"
                        (onChange)="onAdvancedProvinceChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Municipio</label>
                    <p-dropdown
                        [options]="municipalityAdvancedOptions"
                        [(ngModel)]="selectedMunicipalityAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todos"
                        (onChange)="onAdvancedFiltersChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Nivel</label>
                    <p-dropdown
                        [options]="levelAdvancedOptions"
                        [(ngModel)]="selectedLevelAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todos"
                        (onChange)="onAdvancedFiltersChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Unidade</label>
                    <p-dropdown
                        [options]="unitAdvancedOptions"
                        [(ngModel)]="selectedUnitAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todas"
                        (onChange)="onAdvancedFiltersChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Estado</label>
                    <p-dropdown
                        [options]="statusAdvancedOptions"
                        [(ngModel)]="selectedStatusAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todos"
                        (onChange)="onAdvancedFiltersChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Formacao Academica</label>
                    <p-dropdown
                        [options]="academicBackgroundAdvancedOptions"
                        [(ngModel)]="selectedAcademicBackgroundAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todas"
                        (onChange)="onAdvancedFiltersChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Centro</label>
                    <p-dropdown
                        [options]="centerAdvancedOptions"
                        [(ngModel)]="selectedCenterAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todos"
                        (onChange)="onAdvancedFiltersChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>

                <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                    <label class="block mb-2 font-medium">Genero</label>
                    <p-dropdown
                        [options]="genderAdvancedOptions"
                        [(ngModel)]="selectedGenderAdvanced"
                        optionLabel="label"
                        optionValue="value"
                        [showClear]="true"
                        placeholder="Todos"
                        (onChange)="onAdvancedFiltersChange()"
                        styleClass="w-full"
                    ></p-dropdown>
                </div>
            </div>

            <p-chart
                type="bar"
                [data]="advancedSearchChartData"
                [options]="advancedSearchChartOptions"
                height="340px"
            ></p-chart>
        </div>
    </div>

    <!-- Students Status Distribution Pie Chart -->
    <div class="col-12 md:col-4">
        <div class="card h-full">
            <div *ngIf="!(loadingDashboardStatistics$ | async); else chartSkeleton">
                <p-chart
                    type="pie"
                    [data]="pieDataStatus"
                    [options]="pieStatusOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Students Gender Distribution Pie Chart -->
    <div class="col-12 md:col-4">
        <div class="card h-full">
            <div *ngIf="!(loadingDashboardStatistics$ | async); else chartSkeleton2">
                <p-chart
                    type="pie"
                    [data]="pieDataGender"
                    [options]="pieGenderOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton2>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!--Students Age Distribution Pie Chart -->
    <div class="col-12 md:col-4">
        <div class="card h-full">
            <div *ngIf="!(loadingDashboardStatistics$ | async); else chartSkeleton3">
                <p-chart
                    type="pie"
                    [data]="pieDataAge"
                    [options]="pieAgeOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton3>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Province/Municipality Distribution Bar Chart -->
    <div class="col-12">
        <div class="card h-full">
            <div class="flex justify-content-between align-items-center mb-3">
                <h5 class="text-xl font-semibold m-0">Estudantes por Município</h5>
                <div class="flex align-items-center gap-2">
                    <label for="provinceFilter" class="font-medium text-900">Filtrar por Província:</label>
                    <p-dropdown
                        id="provinceFilter"
                        [options]="(provinceFilterOptions$ | async) || []"
                        [(ngModel)]="selectedProvinceFilter"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Todas as Províncias"
                        [showClear]="true"
                        (onChange)="onProvinceFilterChange()"
                        [disabled]="!!(loadingDashboardStatistics$ | async)"
                        styleClass="w-12rem"
                    ></p-dropdown>
                </div>
            </div>
            <div *ngIf="!(loadingDashboardStatistics$ | async); else chartSkeleton5">
                <p-chart
                    type="bar"
                    [data]="barChartDataMunicipality"
                    [options]="barChartMunicipalityOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton5>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Academic Background Distribution Bar Chart -->
    <div class="col-12">
        <div class="card h-full">
            <div *ngIf="!(loadingDashboardStatistics$ | async); else chartSkeleton6">
                <p-chart
                    type="bar"
                    [data]="barChartDataAcademicBackground"
                    [options]="barChartAcademicBackgroundOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton6>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Level Distribution Bar Chart -->
    <div class="col-12">
        <div class="card h-full">
            <div *ngIf="!(loadingDashboardStatistics$ | async); else chartSkeleton7">
                <p-chart
                    type="bar"
                    [data]="barChartDataLevel"
                    [options]="barChartLevelOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton7>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Center Distribution Bar Chart -->
    <div class="col-12">
        <div class="card h-full">
            <div *ngIf="!(loadingDashboardStatistics$ | async); else chartSkeleton8">
                <p-chart
                    type="bar"
                    [data]="barChartDataCenter"
                    [options]="barChartCenterOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton8>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>
</div>
