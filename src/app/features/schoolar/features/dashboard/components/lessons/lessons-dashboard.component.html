<div class="grid">
    <!-- KPIs -->
    <ng-container *ngIf="loadingLessonsDashboardStatistics$ | async; else kpisContent">
        <div class="col-12 md:col-6 xl:col-3" *ngFor="let i of [1,2,3,4]">
            <div class="card h-full">
                <p-skeleton height="2rem" class="mb-2"></p-skeleton>
                <p-skeleton height="3rem" width="4rem"></p-skeleton>
                <p-skeleton height="1rem" width="3rem" class="mt-2"></p-skeleton>
            </div>
        </div>
    </ng-container>

    <!-- KPIs cards -->
    <ng-template #kpisContent>
        <div class="col-12 md:col-6 xl:col-3" *ngFor="let kpi of kpis$ | async">
            <div class="card h-full">
                <span class="font-semibold text-lg">{{ kpi.label }}</span>
                <div class="flex justify-content-between align-items-start mt-3">
                    <div class="w-6">
                        <span class="text-4xl font-bold text-900">{{ kpi.current }}</span>
                        <!-- <div [ngClass]="kpi.diff > 0 ? 'text-green-500' : 'text-red-500'">
                             <i class="pi" [ngClass]="kpi.diff > 0 ? 'pi-arrow-up' : 'pi-arrow-down'"></i>
                             {{ kpi.diff }}%
                         </div> -->
                    </div>
                </div>
            </div>
        </div>
    </ng-template>

    <!-- Advanced Lesson Research Chart -->
    <div class="col-12">
        <div class="card h-full p-4">
            <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center gap-3 mb-4">
                <h5 class="text-xl font-semibold m-0">Pesquisa Avancada de Aulas</h5>
                <div class="flex align-items-center gap-3">
                    <div class="flex align-items-center gap-2 px-3 py-2 border-round-xl surface-100 border-1 surface-border">
                        <i class="pi pi-sliders-h text-primary"></i>
                        <span class="text-sm font-medium">Mostrar pesquisa</span>
                        <p-inputSwitch [(ngModel)]="showAdvancedSearchChart"></p-inputSwitch>
                    </div>
                    <div class="flex align-items-center gap-2" *ngIf="showAdvancedSearchChart">
                        <span class="text-600">Resultados: <strong>{{ filteredLessonsCount }}</strong></span>
                        <button
                            pButton
                            type="button"
                            label="Limpar filtros"
                            class="p-button-sm p-button-outlined"
                            (click)="clearAdvancedFilters()"
                        ></button>
                    </div>
                </div>
            </div>

            <ng-container *ngIf="showAdvancedSearchChart; else advancedChartDisabled">
                <div class="flex flex-wrap gap-2 mb-4" *ngIf="activeAdvancedFilterChips.length > 0">
                    <button
                        type="button"
                        class="p-button p-component p-button-text p-button-sm border-round-sm surface-100 text-color px-2 py-1"
                        *ngFor="let chip of activeAdvancedFilterChips"
                        (click)="removeAdvancedFilter(chip.key)"
                    >
                        <span>{{ chip.label }}: {{ chip.value }}</span>
                        <i class="pi pi-times ml-2 text-xs"></i>
                    </button>
                </div>

                <div class="grid mb-4" style="row-gap: 0.85rem;">
                    <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                        <label class="block mb-2 font-medium">Estado</label>
                        <p-dropdown
                            [options]="statusAdvancedOptions"
                            [(ngModel)]="selectedStatusAdvanced"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            placeholder="Todos"
                            (onChange)="onAdvancedFiltersChange()"
                            styleClass="w-full"
                        ></p-dropdown>
                    </div>

                    <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                        <label class="block mb-2 font-medium">Tipo</label>
                        <p-dropdown
                            [options]="typeAdvancedOptions"
                            [(ngModel)]="selectedTypeAdvanced"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            placeholder="Todos"
                            (onChange)="onAdvancedFiltersChange()"
                            styleClass="w-full"
                        ></p-dropdown>
                    </div>

                    <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                        <label class="block mb-2 font-medium">Modo</label>
                        <p-dropdown
                            [options]="onlineAdvancedOptions"
                            [(ngModel)]="selectedOnlineAdvanced"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            placeholder="Todos"
                            (onChange)="onAdvancedFiltersChange()"
                            styleClass="w-full"
                        ></p-dropdown>
                    </div>

                    <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                        <label class="block mb-2 font-medium">Centro</label>
                        <p-dropdown
                            [options]="centerAdvancedOptions"
                            [(ngModel)]="selectedCenterAdvanced"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            placeholder="Todos"
                            (onChange)="onAdvancedFiltersChange()"
                            styleClass="w-full"
                        ></p-dropdown>
                    </div>

                    <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                        <label class="block mb-2 font-medium">Nivel</label>
                        <p-dropdown
                            [options]="levelAdvancedOptions"
                            [(ngModel)]="selectedLevelAdvanced"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            placeholder="Todos"
                            (onChange)="onAdvancedFiltersChange()"
                            styleClass="w-full"
                        ></p-dropdown>
                    </div>

                    <div class="col-12 md:col-6 lg:col-4 xl:col-3">
                        <label class="block mb-2 font-medium">Unidade</label>
                        <p-dropdown
                            [options]="unitAdvancedOptions"
                            [(ngModel)]="selectedUnitAdvanced"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            placeholder="Todas"
                            (onChange)="onAdvancedFiltersChange()"
                            styleClass="w-full"
                        ></p-dropdown>
                    </div>
                </div>

                <div class="pt-2">
                    <p-chart
                        type="bar"
                        [data]="advancedSearchChartData"
                        [options]="advancedSearchChartOptions"
                        [plugins]="[advancedBarsValuePlugin]"
                        height="360px"
                    ></p-chart>
                </div>
            </ng-container>

            <ng-template #advancedChartDisabled>
                <div class="surface-50 border-1 surface-border border-round-lg p-4 text-center">
                    <i class="pi pi-sliders-h text-2xl text-500 mb-2"></i>
                    <p class="m-0 text-600">Ative o toggle para mostrar os filtros e o grafico avancado.</p>
                </div>
            </ng-template>
        </div>
    </div>

    <!-- Lesson Status Distribution Pie Chart -->
    <div class="col-12 md:col-6">
        <div class="card h-full">
            <div *ngIf="!(loadingLessonsDashboardStatistics$ | async); else chartSkeleton1">
                <p-chart
                    type="pie"
                    [data]="pieDataStatus"
                    [options]="pieStatusOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton1>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Lesson Type Distribution Pie Chart -->
    <div class="col-12 md:col-6">
        <div class="card h-full">
            <div *ngIf="!(loadingLessonsDashboardStatistics$ | async); else chartSkeleton2">
                <p-chart
                    type="pie"
                    [data]="pieDataType"
                    [options]="pieTypeOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton2>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Lesson Online/Presencial Distribution Pie Chart -->
    <div class="col-12 md:col-6">
        <div class="card h-full">
            <div *ngIf="!(loadingLessonsDashboardStatistics$ | async); else chartSkeleton3">
                <p-chart
                    type="pie"
                    [data]="pieDataOnline"
                    [options]="pieOnlineOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton3>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Lesson Center Distribution Bar Chart -->
    <div class="col-12 md:col-6">
        <div class="card h-full">
            <div *ngIf="!(loadingLessonsDashboardStatistics$ | async); else chartSkeleton4">
                <p-chart
                    type="bar"
                    [data]="barChartDataCenter"
                    [options]="barChartCenterOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton4>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>


    <!-- Lesson Unit Distribution Bar Chart -->
    <div class="col-12">
        <div class="card h-full">
            <div class="flex justify-content-between align-items-center mb-3">
                <h5 class="text-xl font-semibold m-0">Aulas por Níveis/Unidade</h5>
                <div class="flex align-items-center gap-2">
                    <label for="levelFilter" class="font-medium text-900">Filtrar por Nível:</label>
                    <p-dropdown
                        id="levelFilter"
                        [options]="(levelFilterOptions$ | async) || []"
                        [(ngModel)]="selectedLevelFilter"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Todos os Níveis"
                        [showClear]="true"
                        (onChange)="onLevelFilterChange()"
                        [disabled]="!!(loadingLessonsDashboardStatistics$ | async)"
                        styleClass="w-12rem"
                    ></p-dropdown>
                </div>
            </div>
            <div *ngIf="!(loadingLessonsDashboardStatistics$ | async); else chartSkeleton6">
                <p-chart
                    type="bar"
                    [data]="barChartDataUnit"
                    [options]="barChartUnitOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton6>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div>

    <!-- Lesson Attendance Distribution Bar Chart
    <div class="col-12">
        <div class="card h-full">
            <div *ngIf="!(loadingLessonsDashboardStatistics$ | async); else chartSkeleton7">
                <p-chart
                    type="bar"
                    [data]="barChartDataAttendance"
                    [options]="barChartAttendanceOptions"
                    height="300px"
                ></p-chart>
            </div>
            <ng-template #chartSkeleton7>
                <p-skeleton height="300px"></p-skeleton>
            </ng-template>
        </div>
    </div> -->

</div>
